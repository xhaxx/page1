<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: radial-gradient(ellipse at center, #0a1628 0%, #000 100%);
      }
      #root {
        width: 1920px;
        height: 1080px;
        position: relative;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="10"
      data-width="1920"
      data-height="1080"
    ></div>

    <script>

      const WIDTH = 1920;
      const HEIGHT = 1080;

      // ── Canvas 2D 程序化纹理 ──────────────────────────
      function createEarthTexture(size = 512) {
        const canvas = document.createElement("canvas");
        canvas.width = size * 2;
        canvas.height = size;
        const ctx = canvas.getContext("2d");

        // 深海蓝底色
        const oceanGrad = ctx.createLinearGradient(0, 0, 0, size);
        oceanGrad.addColorStop(0, "#0b3d6b");
        oceanGrad.addColorStop(0.5, "#12538c");
        oceanGrad.addColorStop(1, "#0b3d6b");
        ctx.fillStyle = oceanGrad;
        ctx.fillRect(0, 0, size * 2, size);

        // 大陆块 — 用椭圆近似各大陆
        ctx.fillStyle = "#2d7d3f";
        const continents = [
          // 北美
          { cx: 0.22, cy: 0.28, rx: 0.13, ry: 0.22, rot: -0.15 },
          { cx: 0.16, cy: 0.22, rx: 0.06, ry: 0.10, rot: 0.05 },
          // 南美
          { cx: 0.24, cy: 0.62, rx: 0.05, ry: 0.16, rot: 0.10 },
          { cx: 0.27, cy: 0.72, rx: 0.04, ry: 0.08, rot: 0.20 },
          // 欧洲
          { cx: 0.48, cy: 0.22, rx: 0.07, ry: 0.10, rot: 0.00 },
          { cx: 0.46, cy: 0.28, rx: 0.04, ry: 0.06, rot: -0.10 },
          // 非洲
          { cx: 0.48, cy: 0.52, rx: 0.08, ry: 0.20, rot: 0.02 },
          { cx: 0.50, cy: 0.60, rx: 0.05, ry: 0.14, rot: 0.08 },
          // 亚洲
          { cx: 0.62, cy: 0.25, rx: 0.18, ry: 0.24, rot: 0.00 },
          { cx: 0.70, cy: 0.35, rx: 0.06, ry: 0.10, rot: -0.10 },
          // 东南亚群岛
          { cx: 0.72, cy: 0.48, rx: 0.03, ry: 0.04, rot: 0.20 },
          { cx: 0.76, cy: 0.52, rx: 0.02, ry: 0.03, rot: -0.15 },
          // 澳大利亚
          { cx: 0.76, cy: 0.68, rx: 0.06, ry: 0.07, rot: 0.05 },
          // 格陵兰
          { cx: 0.34, cy: 0.12, rx: 0.03, ry: 0.06, rot: -0.10 },
          // 南极洲
          { cx: 0.50, cy: 0.92, rx: 0.40, ry: 0.10, rot: 0.00 },
          // 马达加斯加
          { cx: 0.56, cy: 0.72, rx: 0.01, ry: 0.03, rot: 0.30 },
          // 新西兰
          { cx: 0.82, cy: 0.78, rx: 0.01, ry: 0.04, rot: 0.40 },
          // 日本
          { cx: 0.78, cy: 0.34, rx: 0.01, ry: 0.04, rot: 0.20 },
        ];

        for (const c of continents) {
          ctx.save();
          ctx.translate(c.cx * size * 2, c.cy * size);
          ctx.rotate(c.rot);
          ctx.beginPath();
          ctx.ellipse(0, 0, c.rx * size * 2, c.ry * size, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }

        // 更亮的陆地块
        ctx.fillStyle = "#4a9e3f";
        const highlights = [
          { cx: 0.64, cy: 0.24, rx: 0.12, ry: 0.16, rot: 0.00 },
          { cx: 0.20, cy: 0.30, rx: 0.08, ry: 0.14, rot: -0.10 },
          { cx: 0.46, cy: 0.54, rx: 0.05, ry: 0.12, rot: 0.00 },
          { cx: 0.24, cy: 0.64, rx: 0.03, ry: 0.10, rot: 0.10 },
        ];

        for (const h of highlights) {
          ctx.save();
          ctx.translate(h.cx * size * 2, h.cy * size);
          ctx.rotate(h.rot);
          ctx.beginPath();
          ctx.ellipse(0, 0, h.rx * size * 2, h.ry * size, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }

        // 云层纹理
        ctx.fillStyle = "rgba(255,255,255,0.06)";
        for (let i = 0; i < 120; i++) {
          const x = (i * 137.5 + 42) % (size * 2);
          const y = (i * 97.3 + 17) % size;
          const r = 3 + (i % 8) * 2;
          const alpha = 0.03 + (i % 5) * 0.02;
          ctx.fillStyle = `rgba(255,255,255,${alpha})`;
          ctx.beginPath();
          ctx.ellipse(x, y, r * 3, r * 1.2, (i * 0.3) % Math.PI, 0, Math.PI * 2);
          ctx.fill();
        }

        const texture = new THREE.CanvasTexture(canvas);
        texture.colorSpace = THREE.SRGBColorSpace;
        texture.wrapS = THREE.RepeatWrapping;
        texture.wrapU = THREE.RepeatWrapping;
        return texture;
      }

      // ── Three.js 场景 ────────────────────────────
      const container = document.getElementById("root");

      // Renderer
      const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setSize(WIDTH, HEIGHT);
      renderer.setPixelRatio(1);
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      container.appendChild(renderer.domElement);

      // Scene & Camera
      const scene = new THREE.Scene();

      // 星空背景
      const starsGeo = new THREE.BufferGeometry();
      const starsCount = 800;
      const starsPositions = new Float32Array(starsCount * 3);
      for (let i = 0; i < starsCount; i++) {
        const theta = (i * 1.6180339887) % (Math.PI * 2);
        const phi = Math.acos(1 - (2 * (i + 0.5)) / starsCount);
        const radius = 5 + (i % 3) * 2;
        starsPositions[i * 3] = Math.sin(phi) * Math.cos(theta) * radius;
        starsPositions[i * 3 + 1] = Math.sin(phi) * Math.sin(theta) * radius;
        starsPositions[i * 3 + 2] = Math.cos(phi) * radius;
      }
      starsGeo.setAttribute("position", new THREE.BufferAttribute(starsPositions, 3));
      const starsMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.015, transparent: true, opacity: 0.8 });
      const stars = new THREE.Points(starsGeo, starsMat);
      scene.add(stars);

      const camera = new THREE.PerspectiveCamera(35, WIDTH / HEIGHT, 0.1, 20);
      camera.position.set(0, 0.1, 3.2);
      camera.lookAt(0, 0, 0);

      // 光照
      const ambientLight = new THREE.AmbientLight(0x335577, 1.2);
      scene.add(ambientLight);

      const sunLight = new THREE.DirectionalLight(0xffffff, 2.5);
      sunLight.position.set(3, 0.8, 2);
      scene.add(sunLight);

      const fillLight = new THREE.DirectionalLight(0x6688cc, 0.8);
      fillLight.position.set(-2, -0.3, -1);
      scene.add(fillLight);

      // 地球
      const earthGeo = new THREE.SphereGeometry(1, 64, 48);
      const earthTex = createEarthTexture();
      const earthMat = new THREE.MeshStandardMaterial({
        map: earthTex,
        roughness: 0.75,
        metalness: 0.05,
      });
      const earth = new THREE.Mesh(earthGeo, earthMat);
      earth.rotation.x = 0.4; // 23.5度倾斜
      scene.add(earth);

      // 大气光晕
      const glowGeo = new THREE.SphereGeometry(1.03, 64, 48);
      const glowMat = new THREE.MeshBasicMaterial({
        color: 0x4488ff,
        transparent: true,
        opacity: 0.08,
        side: THREE.BackSide,
      });
      const glow = new THREE.Mesh(glowGeo, glowMat);
      scene.add(glow);

      // ── GSAP 时间线 ──────────────────────────────
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // 10 秒匀速自转一圈
      tl.to(earth.rotation, { y: Math.PI * 2, duration: 10, ease: "none" });

      // 星空微动
      tl.to(stars.rotation, { y: -0.15, duration: 10, ease: "none" }, 0);

      // 每次属性更新后重新渲染
      tl.eventCallback("onUpdate", () => {
        renderer.render(scene, camera);
      });

      window.__timelines["main"] = tl;

      // 初始渲染一帧
      renderer.render(scene, camera);
    </script>
  </body>
</html>
